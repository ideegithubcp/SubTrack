<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Subscription Tracker</title>
<meta name="theme-color" content="#0f1420" />
<style>
  :root {
    --bg: #0f1420;
    --surface: #171d2e;
    --surface2: #1e2637;
    --border: #2a3244;
    --accent: #22d3ee;
    --accent2: #6366f1;
    --text: #eef1f6;
    --muted: #8b94a7;
    --radius: 14px;

    /* categorical identity colors — fixed order, never cycled/reassigned by rank */
    --series-1: #3987e5; /* blue */
    --series-2: #199e70; /* aqua */
    --series-3: #c98500; /* yellow */
    --series-4: #008300; /* green */
    --series-5: #9085e9; /* violet */
    --series-6: #e66767; /* red */
    --series-7: #d55181; /* magenta */
    --series-8: #d95926; /* orange */

    /* status colors — reserved for renewal urgency, never reused as identity */
    --status-good: #0ca30c;
    --status-warning: #fab219;
    --status-critical: #d03b3b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 60px;
  }
  .app { max-width: 960px; margin: 0 auto; padding: 24px 16px; }
  header { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 14px; margin-bottom: 18px; }
  header h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; }
  header h1 span { color: var(--accent); }
  .summary { display: flex; gap: 10px; flex-wrap: wrap; }
  .summary .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 8px 14px; text-align: center; min-width: 90px; }
  .summary .stat .val { font-size: 1.1rem; font-weight: 800; font-variant-numeric: tabular-nums; }
  .summary .stat .lbl { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 1px; }

  .banner { background: linear-gradient(135deg, rgba(250,178,25,0.14), rgba(208,59,59,0.1)); border: 1.5px solid rgba(250,178,25,0.4); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 18px; }
  .banner-title { font-weight: 800; font-size: 0.92rem; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .banner-item { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.18); border-radius: 10px; padding: 8px 10px; margin-bottom: 6px; }
  .banner-item:last-child { margin-bottom: 0; }
  .banner-item .bname { flex: 1; font-size: 0.86rem; font-weight: 600; }
  .bdue { font-size: 0.74rem; padding: 3px 9px; border-radius: 99px; font-weight: 700; white-space: nowrap; }
  .bdue.critical { background: rgba(208,59,59,0.2); color: var(--status-critical); }
  .bdue.warning { background: rgba(250,178,25,0.2); color: var(--status-warning); }
  .banner-item button { border: none; background: var(--status-good); color: #06210f; font-weight: 700; font-size: 0.74rem; padding: 6px 10px; border-radius: 8px; cursor: pointer; white-space: nowrap; }

  /* ── spend breakdown chart ── */
  .spend-chart { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 20px; }
  .spend-chart h3 { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); font-weight: 700; margin-bottom: 14px; }
  .spend-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
  .spend-row:last-child { margin-bottom: 0; }
  .spend-label { width: 140px; flex-shrink: 0; font-size: 0.8rem; display: flex; align-items: flex-start; gap: 7px; line-height: 1.3; }
  .spend-label .row-dot { margin-top: 4px; }
  .spend-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 18px; overflow: hidden; }
  .spend-fill { height: 100%; border-radius: 0 4px 4px 0; }
  .spend-value { width: 62px; text-align: right; font-size: 0.8rem; font-weight: 700; font-variant-numeric: tabular-nums; flex-shrink: 0; }

  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; gap: 10px; flex-wrap: wrap; }
  .btn { border: none; border-radius: 10px; padding: 11px 18px; font-weight: 700; font-size: 0.9rem; cursor: pointer; background: linear-gradient(135deg, var(--accent2), var(--accent)); color: #06101c; transition: opacity 0.15s, transform 0.1s; }
  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.98); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1.5px solid var(--border); }

  .section-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 22px 0 10px; }
  .empty-state { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 0.9rem; background: var(--surface); border-radius: var(--radius); border: 1px dashed var(--border); }

  /* ── segmented frames: annual / monthly / free trial ── */
  .group-frame { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 14px 16px; margin-bottom: 14px; }
  .group-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; padding: 0 2px; }
  .group-title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); font-weight: 700; }
  .group-total { font-size: 0.8rem; font-weight: 800; color: var(--text); font-variant-numeric: tabular-nums; }
  .group-frame .sub-row { background: var(--surface); }

  /* ── subscription rows ── */
  .sub-list { display: flex; flex-direction: column; gap: 8px; }
  .sub-row {
    display: flex; align-items: center; gap: 14px;
    background: var(--surface); border: 1.5px solid var(--border); border-left: 3px solid var(--border);
    border-radius: 12px; padding: 12px 16px; transition: border-color 0.15s;
  }
  .sub-row.urgency-warning { border-left-color: var(--status-warning); }
  .sub-row.urgency-critical { border-left-color: var(--status-critical); }
  .sub-row.cancelled { opacity: 0.5; }
  .row-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .row-main { flex: 1 1 160px; min-width: 0; }
  .row-name { font-weight: 700; font-size: 0.92rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row-name.strike { text-decoration: line-through; color: var(--muted); }
  .row-meta { font-size: 0.72rem; color: var(--muted); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 3px; }
  .row-meta .dot-sep { opacity: 0.5; }
  .tag { font-size: 0.66rem; padding: 2px 8px; border-radius: 99px; background: rgba(250,178,25,0.15); color: var(--status-warning); border: 1px solid rgba(250,178,25,0.3); }
  .row-renewal { text-align: right; min-width: 92px; flex-shrink: 0; }
  .row-renewal .rdate { font-size: 0.78rem; color: var(--muted); font-variant-numeric: tabular-nums; }
  .due-pill { font-size: 0.66rem; padding: 2px 8px; border-radius: 99px; font-weight: 700; display: inline-block; margin-top: 3px; }
  .due-pill.critical { background: rgba(208,59,59,0.18); color: var(--status-critical); }
  .due-pill.warning { background: rgba(250,178,25,0.18); color: var(--status-warning); }
  .row-amount { text-align: right; min-width: 76px; flex-shrink: 0; font-weight: 800; font-size: 0.9rem; font-variant-numeric: tabular-nums; }
  .row-amount.free { color: var(--status-good); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.4px; }
  .row-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .cancel-check { display: flex; align-items: center; gap: 5px; font-size: 0.72rem; color: var(--muted); cursor: pointer; user-select: none; }
  .cancel-check input { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; }
  .icon-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.9rem; padding: 4px; border-radius: 6px; }
  .icon-btn:hover { color: var(--text); background: rgba(255,255,255,0.06); }

  @media (max-width: 640px) {
    .sub-row { flex-wrap: wrap; }
    .row-main { flex-basis: 100%; order: 1; }
    .row-renewal { text-align: left; order: 2; margin-right: auto; }
    .row-amount { order: 3; }
    .row-actions { order: 4; }
    .cc-label { display: none; }
  }

  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--surface); border-radius: 18px; padding: 26px; max-width: 440px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; }
  .modal h2 { font-size: 1.2rem; margin-bottom: 18px; }
  .modal-close { position: absolute; top: 14px; right: 16px; background: none; border: none; color: var(--muted); font-size: 1.3rem; cursor: pointer; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 5px; }
  .field input[type=text], .field input[type=number], .field input[type=date], .field select {
    width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 9px;
    padding: 10px 12px; color: var(--text); font-size: 0.92rem; outline: none;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .checkbox-field { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .checkbox-field input { width: 17px; height: 17px; accent-color: var(--accent); cursor: pointer; }
  .checkbox-field label { font-size: 0.85rem; cursor: pointer; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="app">
  <header>
    <h1>Sub<span>Tracker</span></h1>
    <div class="summary" id="summary"></div>
  </header>

  <div id="reminderBanner"></div>

  <div id="spendChart"></div>

  <div class="toolbar">
    <button class="btn" onclick="openForm()">+ Add Subscription</button>
  </div>

  <div id="activeGroups"></div>

  <div id="cancelledWrap"></div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <button class="modal-close" onclick="closeForm()">✕</button>
    <h2 id="formTitle">Add Subscription</h2>
    <form id="subForm" onsubmit="submitForm(event)">
      <div class="field">
        <label>Name</label>
        <input type="text" id="f-name" placeholder="e.g. Netflix" required />
      </div>
      <div class="field-row">
        <div class="field">
          <label>Amount ($ — 0 for free trial/demo)</label>
          <input type="number" id="f-amount" min="0" step="0.01" value="0" required />
        </div>
        <div class="field">
          <label>Billing Cycle</label>
          <select id="f-cycle">
            <option value="monthly">Monthly</option>
            <option value="annual">Annual</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Payment Method</label>
          <select id="f-paytype" onchange="togglePayName()">
            <option value="creditcard">Credit Card</option>
            <option value="directdeposit">Direct Deposit</option>
          </select>
        </div>
        <div class="field" id="f-payname-wrap">
          <label>Card Name</label>
          <input type="text" id="f-payname" placeholder="e.g. Chase Sapphire" />
        </div>
      </div>
      <div class="field">
        <label id="f-date-label">Renewal Date</label>
        <input type="date" id="f-date" required />
      </div>
      <div class="checkbox-field">
        <input type="checkbox" id="f-flag" />
        <label for="f-flag">🔔 Remind me to cancel before it renews (avoid getting charged)</label>
      </div>
      <button type="submit" class="btn" style="width:100%">Save Subscription</button>
    </form>
  </div>
</div>

<script>
const STORAGE_KEY = 'subtracker.subscriptions.v1';
const REMINDER_DAYS = 7;
const SERIES_VARS = ['--series-1','--series-2','--series-3','--series-4','--series-5','--series-6','--series-7','--series-8'];
let subs = [];
let editingId = null;

// ── persistence ──
function load() {
  try { subs = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { subs = []; }
  rollForwardAll();
  save();
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(subs)); }

// ── date helpers ──
function parseDate(str) { return new Date(str + 'T00:00:00'); }
function todayMidnight() { const d = new Date(); d.setHours(0,0,0,0); return d; }
function toISODate(d) { return d.toISOString().slice(0,10); }
function daysUntil(dateStr) { return Math.round((parseDate(dateStr) - todayMidnight()) / 86400000); }
function addMonths(date, n) {
  const d = new Date(date), day = d.getDate();
  d.setDate(1); d.setMonth(d.getMonth() + n);
  d.setDate(Math.min(day, new Date(d.getFullYear(), d.getMonth()+1, 0).getDate()));
  return d;
}
function addYears(date, n) {
  const d = new Date(date), day = d.getDate(), month = d.getMonth();
  d.setDate(1); d.setFullYear(d.getFullYear() + n); d.setMonth(month);
  d.setDate(Math.min(day, new Date(d.getFullYear(), d.getMonth()+1, 0).getDate()));
  return d;
}
function nextCycleDate(dateStr, cycle) {
  const d = parseDate(dateStr);
  return toISODate(cycle === 'annual' ? addYears(d, 1) : addMonths(d, 1));
}
function rollForwardAll() {
  const today = todayMidnight();
  subs.forEach(s => {
    if (s.cancelled) return;
    let guard = 0;
    while (parseDate(s.renewalDate) < today && guard < 240) {
      s.renewalDate = nextCycleDate(s.renewalDate, s.cycle);
      guard++;
    }
  });
}
function fmtDate(dateStr) {
  return parseDate(dateStr).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
}
function fmtMoney(n) { return '$' + Number(n).toFixed(2); }

// ── derived ──
function paymentLabel(s) {
  return s.payType === 'directdeposit' ? 'Direct Deposit' : (s.payName ? s.payName : 'Credit Card');
}
function monthlyEquivalent(s) { return s.cycle === 'annual' ? s.amount / 12 : s.amount; }
// stable per-subscription identity color — hashed from id, not list position, so it never shifts on sort/filter
function seriesColor(id) {
  let h = 0;
  for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) >>> 0;
  return `var(${SERIES_VARS[h % SERIES_VARS.length]})`;
}

// ── rendering ──
function render() {
  renderSummary();
  renderBanner();
  renderSpendChart();
  renderLists();
}
function renderSummary() {
  const active = subs.filter(s => !s.cancelled);
  const monthlyTotal = active.reduce((sum, s) => sum + monthlyEquivalent(s), 0);
  const trialCount = active.filter(s => s.amount === 0).length;
  document.getElementById('summary').innerHTML = `
    <div class="stat"><div class="val">${active.length}</div><div class="lbl">Active</div></div>
    <div class="stat"><div class="val">${fmtMoney(monthlyTotal)}</div><div class="lbl">Per Month</div></div>
    <div class="stat"><div class="val">${fmtMoney(monthlyTotal*12)}</div><div class="lbl">Per Year</div></div>
    <div class="stat"><div class="val">${trialCount}</div><div class="lbl">Free Trials</div></div>
  `;
}
function renderBanner() {
  const upcoming = subs
    .filter(s => !s.cancelled && s.flagCancel && daysUntil(s.renewalDate) <= REMINDER_DAYS)
    .sort((a,b) => daysUntil(a.renewalDate) - daysUntil(b.renewalDate));
  const el = document.getElementById('reminderBanner');
  if (upcoming.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <div class="banner">
      <div class="banner-title">⏰ Cancel before renewal</div>
      ${upcoming.map(s => {
        const d = daysUntil(s.renewalDate);
        const label = d <= 0 ? 'Renews today' : d === 1 ? '1 day left' : `${d} days left`;
        const cls = d <= 2 ? 'critical' : 'warning';
        return `<div class="banner-item">
          <span class="bname">${escapeHtml(s.name)} <span style="color:var(--muted);font-weight:400">· ${fmtDate(s.renewalDate)}</span></span>
          <span class="bdue ${cls}">${label}</span>
          <button onclick="markCancelled('${s.id}')">Mark Cancelled</button>
        </div>`;
      }).join('')}
    </div>`;
}
function renderSpendChart() {
  const el = document.getElementById('spendChart');
  const paid = subs.filter(s => !s.cancelled && s.amount > 0)
    .map(s => ({ ...s, m: monthlyEquivalent(s) }))
    .sort((a,b) => b.m - a.m);
  if (paid.length === 0) { el.innerHTML = ''; return; }
  const max = paid[0].m;
  el.innerHTML = `
    <div class="spend-chart">
      <h3>Monthly Spend Breakdown</h3>
      ${paid.map(s => `
        <div class="spend-row">
          <div class="spend-label"><span class="row-dot" style="background:${seriesColor(s.id)}"></span>${escapeHtml(s.name)}</div>
          <div class="spend-track"><div class="spend-fill" style="width:${Math.max(4, s.m/max*100)}%;background:${seriesColor(s.id)}"></div></div>
          <div class="spend-value">${fmtMoney(s.m)}</div>
        </div>
      `).join('')}
    </div>`;
}
function byUrgency(a, b) { return daysUntil(a.renewalDate) - daysUntil(b.renewalDate); }
function renderLists() {
  const active = subs.filter(s => !s.cancelled);
  const cancelled = subs.filter(s => s.cancelled);

  const annual = active.filter(s => s.amount > 0 && s.cycle === 'annual').sort(byUrgency);
  const monthly = active.filter(s => s.amount > 0 && s.cycle === 'monthly').sort(byUrgency);
  const trials = active.filter(s => s.amount === 0).sort(byUrgency);

  const groups = [
    { title: '📆 Annual Renewals', items: annual, total: annual.length ? fmtMoney(annual.reduce((sum,s) => sum + s.amount, 0)) + '/yr total' : '' },
    { title: '🔁 Monthly Renewals', items: monthly, total: monthly.length ? fmtMoney(monthly.reduce((sum,s) => sum + s.amount, 0)) + '/mo total' : '' },
    { title: '🆓 Free Trials', items: trials, total: '' },
  ].filter(g => g.items.length);

  document.getElementById('activeGroups').innerHTML = groups.length ? groups.map(g => `
    <div class="group-frame">
      <div class="group-header">
        <div class="group-title">${g.title} (${g.items.length})</div>
        ${g.total ? `<div class="group-total">${g.total}</div>` : ''}
      </div>
      <div class="sub-list">${g.items.map(rowHtml).join('')}</div>
    </div>
  `).join('') : `<div class="empty-state">No subscriptions yet — add your first one above.</div>`;

  const wrap = document.getElementById('cancelledWrap');
  wrap.innerHTML = cancelled.length ? `
    <div class="section-label">Cancelled (${cancelled.length})</div>
    <div class="sub-list">${cancelled.map(rowHtml).join('')}</div>
  ` : '';
}
function rowHtml(s) {
  const d = daysUntil(s.renewalDate);
  const urgency = s.cancelled ? '' : d <= 2 ? 'urgency-critical' : d <= 7 ? 'urgency-warning' : '';
  const dueLabel = d < 0 ? 'Overdue' : d === 0 ? 'Today' : d === 1 ? '1 day' : `${d} days`;
  const duePill = !s.cancelled && d <= 7 ? `<span class="due-pill ${d<=2?'critical':'warning'}">${dueLabel}</span>` : '';
  const dotColor = s.cancelled ? 'var(--muted)' : seriesColor(s.id);
  return `
    <div class="sub-row ${urgency} ${s.cancelled ? 'cancelled' : ''}">
      <span class="row-dot" style="background:${dotColor}"></span>
      <div class="row-main">
        <div class="row-name ${s.cancelled ? 'strike' : ''}">${escapeHtml(s.name)}</div>
        <div class="row-meta">
          <span>${s.cycle === 'annual' ? 'Annual' : 'Monthly'}</span>
          <span class="dot-sep">·</span>
          <span>${escapeHtml(paymentLabel(s))}</span>
          ${s.flagCancel ? '<span class="tag">🔔 Cancel before renewal</span>' : ''}
        </div>
      </div>
      <div class="row-renewal">
        <div class="rdate">${fmtDate(s.renewalDate)}</div>
        ${duePill}
      </div>
      <div class="row-amount ${s.amount === 0 ? 'free' : ''}">${s.amount === 0 ? 'Free' : fmtMoney(s.amount) + (s.cycle === 'annual' ? '/yr' : '/mo')}</div>
      <div class="row-actions">
        <label class="cancel-check" title="Mark cancelled">
          <input type="checkbox" ${s.cancelled ? 'checked' : ''} onchange="toggleCancelled('${s.id}', this.checked)" />
          <span class="cc-label">Cancelled</span>
        </label>
        <button class="icon-btn" title="Edit" onclick="openForm('${s.id}')">✏️</button>
        <button class="icon-btn" title="Delete" onclick="deleteSub('${s.id}')">🗑️</button>
      </div>
    </div>`;
}
function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ── mutations ──
function toggleCancelled(id, checked) {
  const s = subs.find(x => x.id === id);
  if (!s) return;
  s.cancelled = checked;
  save(); render();
}
function markCancelled(id) { toggleCancelled(id, true); }
function deleteSub(id) {
  if (!confirm('Delete this subscription?')) return;
  subs = subs.filter(x => x.id !== id);
  save(); render();
}

// ── form ──
function togglePayName() {
  const isCard = document.getElementById('f-paytype').value === 'creditcard';
  document.getElementById('f-payname-wrap').classList.toggle('hidden', !isCard);
}
function openForm(id) {
  editingId = id || null;
  const s = editingId ? subs.find(x => x.id === editingId) : null;
  document.getElementById('formTitle').textContent = s ? 'Edit Subscription' : 'Add Subscription';
  document.getElementById('f-name').value = s ? s.name : '';
  document.getElementById('f-amount').value = s ? s.amount : 0;
  document.getElementById('f-cycle').value = s ? s.cycle : 'monthly';
  document.getElementById('f-paytype').value = s ? s.payType : 'creditcard';
  document.getElementById('f-payname').value = s ? (s.payName || '') : '';
  document.getElementById('f-date').value = s ? s.renewalDate : '';
  document.getElementById('f-flag').checked = s ? !!s.flagCancel : false;
  togglePayName();
  document.getElementById('modalBg').classList.add('open');
  document.getElementById('f-name').focus();
}
function closeForm() {
  document.getElementById('modalBg').classList.remove('open');
  document.getElementById('subForm').reset();
  editingId = null;
}
function submitForm(e) {
  e.preventDefault();
  const data = {
    name: document.getElementById('f-name').value.trim(),
    amount: parseFloat(document.getElementById('f-amount').value) || 0,
    cycle: document.getElementById('f-cycle').value,
    payType: document.getElementById('f-paytype').value,
    payName: document.getElementById('f-payname').value.trim(),
    renewalDate: document.getElementById('f-date').value,
    flagCancel: document.getElementById('f-flag').checked,
  };
  if (!data.name || !data.renewalDate) return;

  if (editingId) {
    const s = subs.find(x => x.id === editingId);
    Object.assign(s, data);
  } else {
    subs.push({ id: crypto.randomUUID(), cancelled: false, ...data });
  }
  save();
  closeForm();
  render();
}

document.getElementById('modalBg').addEventListener('click', e => {
  if (e.target.id === 'modalBg') closeForm();
});

load();
render();
</script>
</body>
</html>
