<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Subscription Tracker</title>
<meta name="theme-color" content="#0f1420" />
<style>
  :root {
    --bg: #0f1420;
    --surface: #171d2e;
    --surface2: #1e2637;
    --border: #2a3244;
    --accent: #22d3ee;
    --accent2: #6366f1;
    --text: #eef1f6;
    --muted: #8b94a7;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 60px;
  }
  .app { max-width: 960px; margin: 0 auto; padding: 24px 16px; }
  header { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 14px; margin-bottom: 18px; }
  header h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; }
  header h1 span { color: var(--accent); }
  .summary { display: flex; gap: 10px; flex-wrap: wrap; }
  .summary .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 8px 14px; text-align: center; min-width: 90px; }
  .summary .stat .val { font-size: 1.1rem; font-weight: 800; }
  .summary .stat .lbl { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 1px; }

  .banner { background: linear-gradient(135deg, rgba(245,158,11,0.14), rgba(239,68,68,0.1)); border: 1.5px solid rgba(245,158,11,0.4); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 18px; }
  .banner-title { font-weight: 800; font-size: 0.92rem; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .banner-item { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.18); border-radius: 10px; padding: 8px 10px; margin-bottom: 6px; }
  .banner-item:last-child { margin-bottom: 0; }
  .banner-item .bname { flex: 1; font-size: 0.86rem; font-weight: 600; }
  .banner-item .bdue { font-size: 0.74rem; padding: 3px 9px; border-radius: 99px; font-weight: 700; white-space: nowrap; }
  .bdue.urgent { background: rgba(239,68,68,0.2); color: var(--red); }
  .bdue.soon { background: rgba(245,158,11,0.2); color: var(--amber); }
  .banner-item button { border: none; background: var(--green); color: #06210f; font-weight: 700; font-size: 0.74rem; padding: 6px 10px; border-radius: 8px; cursor: pointer; white-space: nowrap; }

  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; gap: 10px; flex-wrap: wrap; }
  .btn { border: none; border-radius: 10px; padding: 11px 18px; font-weight: 700; font-size: 0.9rem; cursor: pointer; background: linear-gradient(135deg, var(--accent2), var(--accent)); color: #06101c; transition: opacity 0.15s, transform 0.1s; }
  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.98); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1.5px solid var(--border); }
  .btn-danger { background: rgba(239,68,68,0.15); color: var(--red); border: 1.5px solid rgba(239,68,68,0.35); }
  .btn-small { padding: 6px 12px; font-size: 0.78rem; border-radius: 8px; }

  .section-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 22px 0 10px; }
  .sub-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 12px; }
  .empty-state { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 0.9rem; background: var(--surface); border-radius: var(--radius); border: 1px dashed var(--border); }

  .card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 16px; position: relative; transition: border-color 0.15s; }
  .card.flagged { border-color: rgba(245,158,11,0.4); }
  .card.cancelled { opacity: 0.55; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 10px; }
  .card-name { font-weight: 800; font-size: 1rem; line-height: 1.3; }
  .card-name.strike { text-decoration: line-through; }
  .card-price { font-size: 1.05rem; font-weight: 800; color: var(--accent); white-space: nowrap; }
  .card-price.free { color: var(--green); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.5px; }
  .card-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .tag { font-size: 0.68rem; padding: 3px 9px; border-radius: 99px; background: rgba(255,255,255,0.06); color: var(--muted); border: 1px solid var(--border); }
  .tag.flag { background: rgba(245,158,11,0.15); color: var(--amber); border-color: rgba(245,158,11,0.3); }
  .card-renewal { font-size: 0.8rem; color: var(--muted); margin-bottom: 12px; }
  .card-renewal strong { color: var(--text); }
  .card-actions { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .cancel-check { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: var(--muted); cursor: pointer; user-select: none; }
  .cancel-check input { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; }
  .card-icons { display: flex; gap: 6px; }
  .icon-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.95rem; padding: 4px; border-radius: 6px; }
  .icon-btn:hover { color: var(--text); background: rgba(255,255,255,0.06); }

  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--surface); border-radius: 18px; padding: 26px; max-width: 440px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; }
  .modal h2 { font-size: 1.2rem; margin-bottom: 18px; }
  .modal-close { position: absolute; top: 14px; right: 16px; background: none; border: none; color: var(--muted); font-size: 1.3rem; cursor: pointer; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 5px; }
  .field input[type=text], .field input[type=number], .field input[type=date], .field select {
    width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 9px;
    padding: 10px 12px; color: var(--text); font-size: 0.92rem; outline: none;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .checkbox-field { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .checkbox-field input { width: 17px; height: 17px; accent-color: var(--accent); cursor: pointer; }
  .checkbox-field label { font-size: 0.85rem; cursor: pointer; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="app">
  <header>
    <h1>Sub<span>Tracker</span></h1>
    <div class="summary" id="summary"></div>
  </header>

  <div id="reminderBanner"></div>

  <div class="toolbar">
    <button class="btn" onclick="openForm()">+ Add Subscription</button>
  </div>

  <div class="section-label">Active</div>
  <div class="sub-grid" id="activeList"></div>

  <div id="cancelledWrap"></div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <button class="modal-close" onclick="closeForm()">✕</button>
    <h2 id="formTitle">Add Subscription</h2>
    <form id="subForm" onsubmit="submitForm(event)">
      <div class="field">
        <label>Name</label>
        <input type="text" id="f-name" placeholder="e.g. Netflix" required />
      </div>
      <div class="field-row">
        <div class="field">
          <label>Amount ($ — 0 for free trial/demo)</label>
          <input type="number" id="f-amount" min="0" step="0.01" value="0" required />
        </div>
        <div class="field">
          <label>Billing Cycle</label>
          <select id="f-cycle">
            <option value="monthly">Monthly</option>
            <option value="annual">Annual</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Payment Method</label>
          <select id="f-paytype" onchange="togglePayName()">
            <option value="creditcard">Credit Card</option>
            <option value="directdeposit">Direct Deposit</option>
          </select>
        </div>
        <div class="field" id="f-payname-wrap">
          <label>Card Name</label>
          <input type="text" id="f-payname" placeholder="e.g. Chase Sapphire" />
        </div>
      </div>
      <div class="field">
        <label id="f-date-label">Renewal Date</label>
        <input type="date" id="f-date" required />
      </div>
      <div class="checkbox-field">
        <input type="checkbox" id="f-flag" />
        <label for="f-flag">🔔 Remind me to cancel before it renews (avoid getting charged)</label>
      </div>
      <button type="submit" class="btn" style="width:100%">Save Subscription</button>
    </form>
  </div>
</div>

<script>
const STORAGE_KEY = 'subtracker.subscriptions.v1';
const REMINDER_DAYS = 7;
let subs = [];
let editingId = null;

// ── persistence ──
function load() {
  try { subs = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { subs = []; }
  rollForwardAll();
  save();
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(subs)); }

// ── date helpers ──
function parseDate(str) { return new Date(str + 'T00:00:00'); }
function todayMidnight() { const d = new Date(); d.setHours(0,0,0,0); return d; }
function toISODate(d) { return d.toISOString().slice(0,10); }
function daysUntil(dateStr) { return Math.round((parseDate(dateStr) - todayMidnight()) / 86400000); }
function addMonths(date, n) {
  const d = new Date(date), day = d.getDate();
  d.setDate(1); d.setMonth(d.getMonth() + n);
  d.setDate(Math.min(day, new Date(d.getFullYear(), d.getMonth()+1, 0).getDate()));
  return d;
}
function addYears(date, n) {
  const d = new Date(date), day = d.getDate(), month = d.getMonth();
  d.setDate(1); d.setFullYear(d.getFullYear() + n); d.setMonth(month);
  d.setDate(Math.min(day, new Date(d.getFullYear(), d.getMonth()+1, 0).getDate()));
  return d;
}
function nextCycleDate(dateStr, cycle) {
  const d = parseDate(dateStr);
  return toISODate(cycle === 'annual' ? addYears(d, 1) : addMonths(d, 1));
}
function rollForwardAll() {
  const today = todayMidnight();
  subs.forEach(s => {
    if (s.cancelled) return;
    let guard = 0;
    while (parseDate(s.renewalDate) < today && guard < 240) {
      s.renewalDate = nextCycleDate(s.renewalDate, s.cycle);
      guard++;
    }
  });
}
function fmtDate(dateStr) {
  return parseDate(dateStr).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
}
function fmtMoney(n) { return '$' + Number(n).toFixed(2); }

// ── derived ──
function paymentLabel(s) {
  return s.payType === 'directdeposit' ? 'Direct Deposit' : (s.payName ? s.payName : 'Credit Card');
}
function monthlyEquivalent(s) { return s.cycle === 'annual' ? s.amount / 12 : s.amount; }

// ── rendering ──
function render() {
  renderSummary();
  renderBanner();
  renderLists();
}
function renderSummary() {
  const active = subs.filter(s => !s.cancelled);
  const monthlyTotal = active.reduce((sum, s) => sum + monthlyEquivalent(s), 0);
  const trialCount = active.filter(s => s.amount === 0).length;
  document.getElementById('summary').innerHTML = `
    <div class="stat"><div class="val">${active.length}</div><div class="lbl">Active</div></div>
    <div class="stat"><div class="val">${fmtMoney(monthlyTotal)}</div><div class="lbl">Per Month</div></div>
    <div class="stat"><div class="val">${fmtMoney(monthlyTotal*12)}</div><div class="lbl">Per Year</div></div>
    <div class="stat"><div class="val">${trialCount}</div><div class="lbl">Free Trials</div></div>
  `;
}
function renderBanner() {
  const upcoming = subs
    .filter(s => !s.cancelled && s.flagCancel && daysUntil(s.renewalDate) <= REMINDER_DAYS)
    .sort((a,b) => daysUntil(a.renewalDate) - daysUntil(b.renewalDate));
  const el = document.getElementById('reminderBanner');
  if (upcoming.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <div class="banner">
      <div class="banner-title">⏰ Cancel before renewal</div>
      ${upcoming.map(s => {
        const d = daysUntil(s.renewalDate);
        const label = d <= 0 ? 'Renews today' : d === 1 ? '1 day left' : `${d} days left`;
        const cls = d <= 2 ? 'urgent' : 'soon';
        return `<div class="banner-item">
          <span class="bname">${escapeHtml(s.name)} <span style="color:var(--muted);font-weight:400">· ${fmtDate(s.renewalDate)}</span></span>
          <span class="bdue ${cls}">${label}</span>
          <button onclick="markCancelled('${s.id}')">Mark Cancelled</button>
        </div>`;
      }).join('')}
    </div>`;
}
function renderLists() {
  const active = subs.filter(s => !s.cancelled).sort((a,b) => daysUntil(a.renewalDate) - daysUntil(b.renewalDate));
  const cancelled = subs.filter(s => s.cancelled);

  document.getElementById('activeList').innerHTML = active.length
    ? active.map(cardHtml).join('')
    : `<div class="empty-state" style="grid-column:1/-1">No subscriptions yet — add your first one above.</div>`;

  const wrap = document.getElementById('cancelledWrap');
  wrap.innerHTML = cancelled.length ? `
    <div class="section-label">Cancelled (${cancelled.length})</div>
    <div class="sub-grid">${cancelled.map(cardHtml).join('')}</div>
  ` : '';
}
function cardHtml(s) {
  const d = daysUntil(s.renewalDate);
  const dueLabel = s.cancelled ? '' : (d < 0 ? `overdue` : d === 0 ? 'today' : d === 1 ? 'in 1 day' : `in ${d} days`);
  return `
    <div class="card ${s.flagCancel && !s.cancelled ? 'flagged' : ''} ${s.cancelled ? 'cancelled' : ''}">
      <div class="card-top">
        <div class="card-name ${s.cancelled ? 'strike' : ''}">${escapeHtml(s.name)}</div>
        <div class="card-price ${s.amount === 0 ? 'free' : ''}">${s.amount === 0 ? 'Free trial' : fmtMoney(s.amount) + (s.cycle === 'annual' ? '/yr' : '/mo')}</div>
      </div>
      <div class="card-meta">
        <span class="tag">${s.cycle === 'annual' ? 'Annual' : 'Monthly'}</span>
        <span class="tag">${escapeHtml(paymentLabel(s))}</span>
        ${s.flagCancel ? '<span class="tag flag">🔔 Cancel before renewal</span>' : ''}
      </div>
      <div class="card-renewal">Renews <strong>${fmtDate(s.renewalDate)}</strong>${dueLabel ? ` · ${dueLabel}` : ''}</div>
      <div class="card-actions">
        <label class="cancel-check">
          <input type="checkbox" ${s.cancelled ? 'checked' : ''} onchange="toggleCancelled('${s.id}', this.checked)" />
          Cancelled
        </label>
        <div class="card-icons">
          <button class="icon-btn" title="Edit" onclick="openForm('${s.id}')">✏️</button>
          <button class="icon-btn" title="Delete" onclick="deleteSub('${s.id}')">🗑️</button>
        </div>
      </div>
    </div>`;
}
function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ── mutations ──
function toggleCancelled(id, checked) {
  const s = subs.find(x => x.id === id);
  if (!s) return;
  s.cancelled = checked;
  save(); render();
}
function markCancelled(id) { toggleCancelled(id, true); }
function deleteSub(id) {
  if (!confirm('Delete this subscription?')) return;
  subs = subs.filter(x => x.id !== id);
  save(); render();
}

// ── form ──
function togglePayName() {
  const isCard = document.getElementById('f-paytype').value === 'creditcard';
  document.getElementById('f-payname-wrap').classList.toggle('hidden', !isCard);
}
function openForm(id) {
  editingId = id || null;
  const s = editingId ? subs.find(x => x.id === editingId) : null;
  document.getElementById('formTitle').textContent = s ? 'Edit Subscription' : 'Add Subscription';
  document.getElementById('f-name').value = s ? s.name : '';
  document.getElementById('f-amount').value = s ? s.amount : 0;
  document.getElementById('f-cycle').value = s ? s.cycle : 'monthly';
  document.getElementById('f-paytype').value = s ? s.payType : 'creditcard';
  document.getElementById('f-payname').value = s ? (s.payName || '') : '';
  document.getElementById('f-date').value = s ? s.renewalDate : '';
  document.getElementById('f-flag').checked = s ? !!s.flagCancel : false;
  togglePayName();
  document.getElementById('modalBg').classList.add('open');
  document.getElementById('f-name').focus();
}
function closeForm() {
  document.getElementById('modalBg').classList.remove('open');
  document.getElementById('subForm').reset();
  editingId = null;
}
function submitForm(e) {
  e.preventDefault();
  const data = {
    name: document.getElementById('f-name').value.trim(),
    amount: parseFloat(document.getElementById('f-amount').value) || 0,
    cycle: document.getElementById('f-cycle').value,
    payType: document.getElementById('f-paytype').value,
    payName: document.getElementById('f-payname').value.trim(),
    renewalDate: document.getElementById('f-date').value,
    flagCancel: document.getElementById('f-flag').checked,
  };
  if (!data.name || !data.renewalDate) return;

  if (editingId) {
    const s = subs.find(x => x.id === editingId);
    Object.assign(s, data);
  } else {
    subs.push({ id: crypto.randomUUID(), cancelled: false, ...data });
  }
  save();
  closeForm();
  render();
}

document.getElementById('modalBg').addEventListener('click', e => {
  if (e.target.id === 'modalBg') closeForm();
});

load();
render();
</script>
</body>
</html>
